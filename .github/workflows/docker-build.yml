name: CI/CD for Library Project

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./APIGateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-gateway:latest
          platforms: linux/amd64

      - name: Build and push Catalog Service
        uses: docker/build-push-action@v5
        with:
          context: ./CatalogService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-books:latest
          platforms: linux/amd64

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./AuthService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-auth:latest
          platforms: linux/amd64

      - name: Build and push Event Service
        uses: docker/build-push-action@v5
        with:
          context: ./EventService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-event:latest
          platforms: linux/amd64

      - name: Build and push Expected Book Service
        uses: docker/build-push-action@v5
        with:
          context: ./ExpectedBooksService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-expected-book:latest
          platforms: linux/amd64

      - name: Build and push Frontend Microservice
        uses: docker/build-push-action@v5
        with:
          context: ./FrontendMicroservice
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-frontend:latest
          platforms: linux/amd64

      - name: Build and push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./OrderService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-order:latest
          platforms: linux/amd64

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./UserService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/library-user:latest
          platforms: linux/amd64
