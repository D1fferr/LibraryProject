spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
jwt:
  secret: "${JWT_SECRET}"
external:
  mail:
    login: "${MAIL_LOGIN}"
    password: "${MAIL_PASSWORD}"
    from: "${MAIL_FROM}"
    host: "${MAIL_HOST}"
  services:
    user: "${USER_URL}"
