spring:
  application:
    name: EventService
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
  mvc:
    hidden method:
      filter:
        enabled: true
  cloud:
    aws:
      region:
        static: us-east-1
  profiles:
    active: local
server:
  port: 8083
