<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - BookLibrary</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --error-color: #e74c3c;
            --text-color: #555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 90%;
        }
        .error-icon {
            font-size: 80px;
            color: var(--error-color);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: var(--primary-color);
            line-height: 1;
        }
        h2 {
            font-size: 24px;
            color: var(--primary-color);
            margin-top: 10px;
        }
        .message {
            font-size: 18px;
            color: var(--text-color);
            margin: 20px 0 30px;
            line-height: 1.5;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background-color: #34495e;
        }
        .btn-home .material-icons {
            margin-right: 8px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-icon">
        <span class="material-icons" th:text="${status >= 500 ? 'settings_suggest' : 'error_outline'}">error_outline</span>
    </div>

    <h1 th:text="${status}">404</h1>

    <h2 th:text="${status >= 500 ? 'Server Error' : 'Request Problem'}">Something went wrong</h2>

    <p class="message" th:text="${error}">
        The request could not be completed. Please try again later or contact support.
    </p>

    <a href="/" class="btn-home">
        <span class="material-icons">home</span>
        Back to Home
    </a>
</div>

</body>
</html>
