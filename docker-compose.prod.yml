version: '3.8'

services:
  db:
    image: postgres:15
    container_name: library-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d library_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: library-redis
    restart: always
    ports:
      - "6379:6379"


  minio:
    image: minio/minio:latest
    container_name: library-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data
      - ./photo:/tmp/photo:ro

  minio-init:
    image: minio/minio:latest
    container_name: minio-mc
    depends_on:
      - minio
    volumes:
      - ./photo:/tmp/photo:ro
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing myminio/images;
      /usr/bin/mc anonymous set public myminio/images;
      /usr/bin/mc cp --recursive /tmp/photo/ myminio/images;
      "
  kafka:
    image: apache/kafka:latest
    container_name: library-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/kafka

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:9092
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic expected-book-topic
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic reservations

  catalog-service:
    image: differr/library-books
    container_name: library-catalog
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}

      - KAFKA_ENDPOINT=${KAFKA_ENDPOINT}

      - GATEWAY_URL=${GATEWAY_URL}
      - RESERVATION_URL=${RESERVATION_URL}
    volumes:
      - ./logs/catalog:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      kafka:
        condition: service_started

  event-service:
    image: differr/library-event
    container_name: library-event
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}

      - CATALOG_URL=${CATALOG_URL}

    volumes:
      - ./logs/event:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  expected-books-service:
    image: differr/library-expected-book
    container_name: library-expected-books
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - MAIL_LOGIN=${MAIL_LOGIN}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_HOST=${MAIL_HOST}

      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}

      - KAFKA_ENDPOINT=${KAFKA_ENDPOINT}

      - CATALOG_URL=${CATALOG_URL}
    volumes:
      - ./logs/expected-books:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started


  user-service:
    image: differr/library-user
    container_name: library-user
    restart: on-failure
    ports:
      - "8087:8087"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

    volumes:
      - ./logs/user:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy


  auth-service:
    image: differr/library-auth
    container_name: library-auth
    restart: on-failure
    ports:
      - "8086:8086"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

      - JWT_SECRET=${JWT_SECRET}

      - MAIL_LOGIN=${MAIL_LOGIN}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_HOST=${MAIL_HOST}

      - USER_URL=${USER_URL}

    volumes:
      - ./logs/auth:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      user-service:
        condition: service_started

  order-service:
    image: differr/library-order
    container_name: library-order
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - MAIL_LOGIN=${MAIL_LOGIN}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_HOST=${MAIL_HOST}

      - KAFKA_ENDPOINT=${KAFKA_ENDPOINT}

      - CATALOG_URL=${CATALOG_URL}
      - USER_URL=${USER_URL}

    volumes:
      - ./logs/order:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
      catalog-service:
        condition: service_started
      user-service:
        condition: service_started

  frontend-service:
    image: differr/library-frontend
    container_name: library-frontend
    restart: on-failure
    ports:
      - "8089:8089"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - GATEWAY_URL=${GATEWAY_URL}

    volumes:
      - ./logs/frontend:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - api-gateway



  api-gateway:
    image: differr/library-gateway
    container_name: library-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Djava.security.egd=file:/dev/./urandom
      - SPRING_PROFILES_ACTIVE=prod
      - CATALOG_URL=${CATALOG_URL}
      - RESERVATION_URL=${RESERVATION_URL}
      - EXPECTED_BOOK_URL=${EXPECTED_BOOK_URL}
      - EVENT_URL=${EVENT_URL}
      - USER_URL=${USER_URL}
      - AUTH_URL=${AUTH_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - MINIO_URL=${MINIO_ENDPOINT}

      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

    volumes:
      - ./logs/gateway:/app/logs

    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - auth-service
      - user-service
      - redis

volumes:
  postgres_data:
  minio_data:
  kafka_data:
