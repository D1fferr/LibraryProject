spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL}"
    username: '${DB_USERNAME}'
    password: "${DB_PASSWORD}"
external:
  mail:
    login: "${MAIL_LOGIN}"
    password: "${MAIL_PASSWORD}"
    from: "${MAIL_FROM}"
    host: "${MAIL_HOST}"
  kafka:
    endpoint: "${KAFKA_ENDPOINT}"
  services:
    catalog: "${CATALOG_URL}"
    user: "${USER_URL}"