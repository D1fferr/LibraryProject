spring:
  application:
    name: ExpectedBooksService
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
  mvc:
    hidden method:
      filter:
        enabled: true
  cloud:
    aws:
      region:
        static: us-east-1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
      file-size-threshold: 2KB
  profiles:
    active: local
server:
  port: 8082