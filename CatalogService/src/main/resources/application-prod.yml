spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  data:
    redis:
      repositories:
        enabled: false
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT}"
external:
  minio:
    endpoint: "${MINIO_ENDPOINT}"
    bucket-name: "${MINIO_BUCKET}"
    access-key: "${MINIO_ACCESS_KEY}"
    secret-key: "${MINIO_SECRET_KEY}"
  kafka:
    endpoint: "${KAFKA_ENDPOINT}"
  services:
    api-gateway: "${GATEWAY_URL}"
    reservation-service: "${RESERVATION_URL}"
